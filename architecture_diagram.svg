<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760" style="background:#f8f9fb;font-family:Arial,Helvetica,sans-serif;">
  <rect x="20" y="20" width="960" height="720" rx="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="500" y="55" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Travel Planner Agent Architecture</text>
  <rect x="70" y="100" width="250" height="100" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="195" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">Frontend</text>
  <text x="195" y="155" text-anchor="middle" font-size="14" fill="#1f2937">Vite + React</text>
  <text x="195" y="175" text-anchor="middle" font-size="14" fill="#1f2937">index.html, src/App.jsx</text>
  <rect x="70" y="220" width="250" height="140" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="195" y="250" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Browser</text>
  <text x="195" y="278" text-anchor="middle" font-size="14" fill="#334155">XHR / fetch calls</text>
  <text x="195" y="298" text-anchor="middle" font-size="14" fill="#334155">/api/message, /api/history</text>
  <rect x="400" y="120" width="250" height="160" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="525" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">Backend API</text>
  <text x="525" y="175" text-anchor="middle" font-size="14" fill="#1e293b">FastAPI server</text>
  <text x="525" y="195" text-anchor="middle" font-size="14" fill="#1e293b">server/app.py</text>
  <text x="525" y="215" text-anchor="middle" font-size="14" fill="#1e293b">/api/message & /api/history</text>
  <rect x="730" y="120" width="230" height="180" rx="14" fill="#ecfccb" stroke="#84cc16" stroke-width="2"/>
  <text x="845" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#365314">Session Store</text>
  <text x="845" y="175" text-anchor="middle" font-size="14" fill="#334155">In-memory sessions</text>
  <text x="845" y="195" text-anchor="middle" font-size="14" fill="#334155">Plus persistence via</text>
  <text x="845" y="215" text-anchor="middle" font-size="14" fill="#334155">supervisor_memory</text>
  <path d="M320 180 L400 180" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M650 240 L730 240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M845 300 L845 360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="150" y="420" width="240" height="220" rx="16" fill="#f4f4ff" stroke="#4338ca" stroke-width="2"/>
  <text x="270" y="450" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">Supervisor</text>
  <text x="270" y="475" text-anchor="middle" font-size="14" fill="#334155">agent/supervisor.py</text>
  <text x="270" y="505" text-anchor="middle" font-size="14" fill="#334155">Intent classification</text>
  <text x="270" y="525" text-anchor="middle" font-size="14" fill="#334155">travel vs general chat</text>
  <rect x="490" y="420" width="240" height="220" rx="16" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="610" y="450" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">Travel Agent</text>
  <text x="610" y="475" text-anchor="middle" font-size="14" fill="#334155">agent/travel_agent.py</text>
  <text x="610" y="495" text-anchor="middle" font-size="14" fill="#334155">LangGraph state machine</text>
  <text x="610" y="515" text-anchor="middle" font-size="14" fill="#334155">Extraction → validation → planning</text>
  <text x="610" y="535" text-anchor="middle" font-size="14" fill="#334155">Flight + hotel tools + LLM</text>
  <rect x="150" y="660" width="240" height="60" rx="12" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
  <text x="270" y="690" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">General Chat</text>
  <text x="270" y="710" text-anchor="middle" font-size="14" fill="#334155">agent/supervisor.py → general_chat()</text>
  <rect x="490" y="660" width="240" height="60" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="610" y="690" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="610" y="710" text-anchor="middle" font-size="14" fill="#334155">ChatGroq model calls</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155" />
    </marker>
  </defs>
  <rect x="730" y="460" width="230" height="160" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="845" y="490" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Tool Integrations</text>
  <text x="845" y="515" text-anchor="middle" font-size="14" fill="#334155">agent/tools/flight.py</text>
  <text x="845" y="535" text-anchor="middle" font-size="14" fill="#334155">agent/tools/tavily.py</text>
  <text x="845" y="555" text-anchor="middle" font-size="14" fill="#334155">External search & hotel APIs</text>
  <path d="M500 530 L730 530" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M270 640 L270 660" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M610 640 L610 660" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M235 360 L235 420" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M625 360 L625 420" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M845 380 L845 460" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M525 285 L525 420" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="360" width="250" height="60" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="195" y="395" text-anchor="middle" font-size="14" fill="#334155">Load / save conversation history</text>
  <text x="195" y="415" text-anchor="middle" font-size="14" fill="#334155">agent/supervisor_memory.py</text>
</svg>